<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sistema de Turnos Médicos</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <div class="container">

            <header class="hero">
                <h1>Sistema de Turnos Médicos</h1>
                <p>Gestiona pacientes y Turnos de una forma moderna y eficiente</p>
            </header>
            
         <div id="mensaje" role="alert" aria-live="polite"></div>

         <section class="card">
            <h2>Registrar Persona</h2>
            <form id="personaForm" novalidate>

                <label for="nombre">Nombre completo</label>
                <input
                type="text"
                id="nombre"
                name="nombre"
                placeholder="Ej: Valery Ruiz"
                autocomplete="name"
                required
            >

            <label for="correo">Correo electronico</label>
            <input
              type="email"
              id="correo"
              name="correo"
              placeholder="Ej: Valery@gmail.com"
              autocomplete="email"
              required
            >

            <label for="documento">Número de documento</label>
            <input
              type="text"
              id="documento"
              name="documento"
              placeholder="Ej: 107845694"
              pattern="\d{6,12}"
              inputmode="numeric"
              required
            >

            <button type="submit">Guardar Persona</button>
           </form>
           </section>
           
           <section class="card">
            <h2> Personas Registradas</h2>
            <table>
                <thead>
                    <tr>
                        <th scope="col">ID</th>
                        <th scope="col">Nombre</th>
                        <th scope="col">Correo</th>
                        <th scope="col">Documento</th>
                        <th scope="col">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaPersonas">
                </tbody>
            </table>
           </section>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
        <script src="app.js"></script>
    </body>   

           
</html>
